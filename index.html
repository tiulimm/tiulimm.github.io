<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עברנו לשרת חדש!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rubik', sans-serif;
        }
        .bg-pattern {
            background-color: #f0fdfa;
            background-image: radial-gradient(#14b8a6 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-teal-50">
    
    <!-- רקע עליז ובהיר -->
    <div class="absolute inset-0 bg-pattern"></div>
    <div class="absolute top-0 right-0 -mr-20 -mt-20 w-72 h-72 rounded-full bg-teal-200 blur-3xl opacity-50"></div>
    <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-blue-200 blur-3xl opacity-50"></div>

    <!-- כרטיס ההודעה -->
    <div class="relative z-10 bg-white rounded-3xl shadow-2xl p-8 md:p-12 max-w-lg w-full mx-4 text-center border border-teal-100 transform transition-all hover:scale-[1.01]">
        
        <!-- אייקון -->
        <div class="w-20 h-20 mx-auto bg-teal-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <!-- כותרת -->
        <h1 class="text-3xl font-bold text-gray-800 mb-4">התחדשנו!</h1>
        
        <!-- טקסט -->
        <p class="text-gray-600 mb-4 leading-relaxed text-lg">
            בעקבות פרצות אבטחה ולמען הגלישה הבטוחה שלכם, העברנו את האתר לשרת חדש, מהיר ומאובטח יותר.
        </p>
        
        <div class="bg-blue-50 text-blue-800 p-4 rounded-xl mb-8 font-medium">
            אל דאגה – כל התוכן שלכם גובה ונשמר במלואו! 
        </div>

        <p class="text-gray-700 font-medium mb-6">
            אתם מוזמנים להיכנס ולהמשיך לגלוש בכיף:
        </p>

        <!-- כפתור מעבר -->
        <a href="http://metailim.pythonanywhere.com/" class="inline-block w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-teal-500 to-blue-500 hover:from-teal-600 hover:to-blue-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
            מעבר לאתר החדש
        </a>
    </div>

</body>
</html>
